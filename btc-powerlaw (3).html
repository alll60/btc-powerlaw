<style>

<body>
<div class="grain"></div>
<div class="hdr">

  <div class="cg"><button class="cb on" id="tB">BTC</button><button class="cb on" id="tBa">Bands</button><button class="cb on" id="tH">Halvings</button></div>
</div>

</div>

    <div class="lookup-form">
      <input type="date" id="lookupDate" value="2030-01-01" min="2009-01-04" max="2060-12-31">
      <button class="lookup-btn" id="lookupBtn">Calculate</button>
    </div>
    <div class="lookup-result" id="lookupResult"></div>
  </div>
</div>

<div class="roi">
  <div class="roi-box">
    <h3>📈 Options / Position ROI Calculator — Uses date above</h3>
    <div class="roi-form">
      <div class="roi-field">
        <label>ETF</label>
        <select id="roiETF">
          <option value="ibit">IBIT (USD)</option>
          <option value="btcc">BTCC.B (CAD)</option>
        </select>
      </div>
      <div class="roi-field">
        <label>Strike Price</label>
        <input type="number" id="roiStrike" value="50" step="0.5" min="0">
      </div>
      <div class="roi-field">
        <label>Option Premium Paid</label>
        <input type="number" id="roiPremium" value="5.00" step="0.1" min="0">
      </div>
      <div class="roi-field">
        <label>Contracts (×100)</label>
        <input type="number" id="roiContracts" value="1" step="1" min="1">
      </div>
      <button class="roi-calc-btn" id="roiCalcBtn">Calculate ROI</button>
    </div>
    <div class="roi-result" id="roiResult"></div>
  </div>
</div>

<script>
const GEN=new Date('2009-01-03'),A=1.0117e-17,B=5.82,FM=0.42,UM=5.5;

// IBIT: $38 USD, fee 0.25%/yr
const IBIT_R=67700/38,IBIT_F=0.0025,IBIT_L=new Date('2024-01-11'),AD=new Date('2026-02-20');
// BTCC.B: C$13, fee 1.45%/yr, USD/CAD 1.368
const USDCAD=1.368,BTCC_R=(67700*USDCAD)/13,BTCC_F=0.0145,BTCC_L=new Date('2021-02-18');

function eIBIT(btc,d){return(btc/IBIT_R)*Math.pow(1-IBIT_F,(d-AD)/31557600000);}
function eBTCC(btc,d){return(btc*USDCAD/BTCC_R)*Math.pow(1-BTCC_F,(d-AD)/31557600000);}

const HV=[new Date('2012-11-28'),new Date('2016-07-09'),new Date('2020-05-11'),new Date('2024-04-20'),new Date('2028-03-20'),new Date('2032-02-20'),new Date('2036-01-20'),new Date('2040-01-01'),new Date('2044-01-01'),new Date('2048-01-01')];

function dg(d){return(d-GEN)/864e5;}
function pl(d){const x=dg(d);return x<=0?0:A*Math.pow(x,B);}
function fl(d){return pl(d)*FM;}
function cl(d){return pl(d)*UM;}

const BH=[['2010-07-01',.08],['2010-10-01',.1],['2011-01-01',.3],['2011-04-01',.8],['2011-06-01',31],['2011-09-01',5],['2011-12-01',3.2],['2012-01-01',5.3],['2012-04-01',5],['2012-07-01',7],['2012-10-01',11],['2012-12-01',13.5],['2013-01-01',13.5],['2013-03-01',34],['2013-04-01',135],['2013-07-01',90],['2013-10-01',140],['2013-12-01',1100],['2014-01-01',770],['2014-04-01',450],['2014-07-01',620],['2014-10-01',340],['2015-01-01',285],['2015-04-01',240],['2015-07-01',260],['2015-10-01',315],['2016-01-01',430],['2016-04-01',420],['2016-07-01',650],['2016-10-01',610],['2017-01-01',960],['2017-04-01',1080],['2017-07-01',2500],['2017-10-01',4400],['2017-12-01',13800],['2018-01-01',17000],['2018-02-01',10200],['2018-04-01',7000],['2018-07-01',6400],['2018-10-01',6300],['2018-12-01',3700],['2019-01-01',3700],['2019-04-01',4100],['2019-07-01',10800],['2019-10-01',8300],['2020-01-01',7200],['2020-03-01',8500],['2020-04-01',6400],['2020-07-01',9100],['2020-10-01',10800],['2020-12-01',29000],['2021-01-01',33000],['2021-02-01',45000],['2021-04-01',58000],['2021-05-01',57000],['2021-07-01',33000],['2021-09-01',47000],['2021-11-01',61000],['2021-12-01',46000],['2022-01-01',47700],['2022-03-01',43000],['2022-05-01',38500],['2022-06-01',20000],['2022-07-01',19300],['2022-09-01',19400],['2022-11-01',20500],['2022-12-01',16500],['2023-01-01',16600],['2023-03-01',23500],['2023-04-01',28400],['2023-06-01',27200],['2023-07-01',29300],['2023-09-01',26000],['2023-10-01',26900],['2023-12-01',42000],['2024-01-01',44000],['2024-02-01',43000],['2024-03-01',63000],['2024-04-01',71000],['2024-05-01',60000],['2024-06-01',67500],['2024-07-01',63000],['2024-08-01',64700],['2024-09-01',57300],['2024-10-01',63300],['2024-11-01',73000],['2024-12-01',96000],['2025-01-01',94000],['2025-02-01',97000],['2025-03-01',84000],['2025-04-01',82500],['2025-05-01',95000],['2025-06-01',107000],['2025-07-01',110000],['2025-08-01',118000],['2025-09-01',120000],['2025-10-01',126000],['2025-11-01',115000],['2025-12-01',95000],['2026-01-01',80000],['2026-02-01',78000],['2026-02-20',67700]];

let S={s:'log',r:'all',btc:true,ba:true,hv:true};
const cv=document.getElementById('c'),cx=cv.getContext('2d'),te=document.getElementById('tt');

function gR(){
  const r={all:new Date('2011-01-01'),'5y':new Date('2021-02-20'),'2y':new Date('2024-02-20'),'1y':new Date('2025-02-20')};
  const e={all:new Date('2050-01-01'),'5y':new Date('2031-01-01'),'2y':new Date('2028-06-01'),'1y':new Date('2027-06-01')};
  return{s:r[S.r],e:e[S.r]};
}

function f$(p){if(p>=1e9)return'$'+(p/1e9).toFixed(1)+'B';if(p>=1e6)return'$'+(p/1e6).toFixed(1)+'M';if(p>=1e3)return'$'+(p/1e3).toFixed(p>=1e5?0:1)+'K';if(p>=1)return'$'+p.toFixed(2);return'$'+p.toFixed(4);}
function fI(p){if(p>=1e6)return'$'+(p/1e6).toFixed(1)+'M';if(p>=1e3)return'$'+(p/1e3).toFixed(1)+'K';return'$'+p.toFixed(2);}
function fC(p){if(p>=1e6)return'C$'+(p/1e6).toFixed(1)+'M';if(p>=1e3)return'C$'+(p/1e3).toFixed(1)+'K';return'C$'+p.toFixed(2);}

function draw(){
  const dp=devicePixelRatio||1,rc=cv.getBoundingClientRect();
  cv.width=rc.width*dp;cv.height=rc.height*dp;cx.scale(dp,dp);
  const W=rc.width,H=rc.height,m={t:20,r:20,b:40,l:70},cw=W-m.l-m.r,ch=H-m.t-m.b;
  const{s:st,e:en}=gR();
  let mn=Infinity,mx=-Infinity;const sd=dg(st),ed=dg(en);
  for(let d=sd;d<=ed;d+=30){const dt=new Date(GEN.getTime()+d*864e5);const fp=fl(dt),cp=cl(dt);if(fp>0)mn=Math.min(mn,fp);mx=Math.max(mx,cp);}
  BH.forEach(([ds,p])=>{const d=new Date(ds);if(d>=st&&d<=en){mn=Math.min(mn,p);mx=Math.max(mx,p);}});
  mn*=.5;mx*=2;const lg=S.s==='log';
  const xS=d=>m.l+((d-st)/(en-st))*cw;
  const yS=p=>{if(lg){const t=(Math.log10(p)-Math.log10(mn))/(Math.log10(mx)-Math.log10(mn));return m.t+(1-t)*ch;}return m.t+(1-(p-mn)/(mx-mn))*ch;};
  cx.fillStyle='#12121a';cx.fillRect(0,0,W,H);

  // grids
  (lg?logT(mn,mx):linT(mn,mx)).forEach(p=>{const y=yS(p);if(y>m.t&&y<H-m.b){cx.strokeStyle='rgba(255,255,255,.04)';cx.lineWidth=1;cx.beginPath();cx.moveTo(m.l,y);cx.lineTo(W-m.r,y);cx.stroke();cx.fillStyle='rgba(255,255,255,.25)';cx.font='10px JetBrains Mono';cx.textAlign='right';cx.fillText(f$(p),m.l-8,y+3);}});
  dT(st,en).forEach(d=>{const x=xS(d);if(x>m.l&&x<W-m.r){cx.strokeStyle='rgba(255,255,255,.04)';cx.beginPath();cx.moveTo(x,m.t);cx.lineTo(x,H-m.b);cx.stroke();cx.fillStyle='rgba(255,255,255,.25)';cx.font='10px JetBrains Mono';cx.textAlign='center';cx.fillText(d.getFullYear()+(S.r==='1y'||S.r==='2y'?'-'+String(d.getMonth()+1).padStart(2,'0'):''),x,H-m.b+18);}});

  if(S.hv)HV.forEach(h=>{if(h>=st&&h<=en){const x=xS(h);cx.strokeStyle='rgba(255,255,255,.12)';cx.setLineDash([4,4]);cx.lineWidth=1;cx.beginPath();cx.moveTo(x,m.t);cx.lineTo(x,H-m.b);cx.stroke();cx.setLineDash([]);cx.fillStyle='rgba(255,255,255,.3)';cx.font='9px JetBrains Mono';cx.textAlign='center';cx.fillText('HALVING',x,m.t+12);cx.fillText(h.getFullYear(),x,m.t+23);}});

  const td=new Date('2026-02-20');
  if(td>=st&&td<=en){const x=xS(td);cx.strokeStyle='rgba(255,255,255,.08)';cx.setLineDash([2,3]);cx.lineWidth=1;cx.beginPath();cx.moveTo(x,m.t);cx.lineTo(x,H-m.b);cx.stroke();cx.setLineDash([]);cx.fillStyle='rgba(255,255,255,.2)';cx.font='9px JetBrains Mono';cx.textAlign='center';cx.fillText('TODAY',x,H-m.b-6);}

  if(S.ba){const sp=Math.max(1,Math.floor((ed-sd)/500)),bp=[];
  for(let d=Math.max(1,sd);d<=ed;d+=sp){const dt=new Date(GEN.getTime()+d*864e5),fp=fl(dt),cp=cl(dt),fv=pl(dt);if(fp>0&&cp>0&&fv>0)bp.push({d:dt,fp,cp,fv});}
  if(bp.length>1){
    cx.globalAlpha=.06;cx.beginPath();bp.forEach((p,i)=>{i?cx.lineTo(xS(p.d),yS(Math.min(p.cp,mx))):cx.moveTo(xS(p.d),yS(Math.min(p.cp,mx)));});for(let i=bp.length-1;i>=0;i--)cx.lineTo(xS(bp[i].d),yS(Math.max(bp[i].fp,mn)));cx.closePath();cx.fillStyle='#f7931a';cx.fill();cx.globalAlpha=1;
    cx.strokeStyle='rgba(255,68,102,.6)';cx.setLineDash([6,4]);cx.lineWidth=1.5;cx.beginPath();bp.forEach((p,i)=>{i?cx.lineTo(xS(p.d),yS(p.cp)):cx.moveTo(xS(p.d),yS(p.cp));});cx.stroke();cx.setLineDash([]);
    cx.strokeStyle='rgba(59,130,246,.6)';cx.setLineDash([6,4]);cx.lineWidth=1.5;cx.beginPath();bp.forEach((p,i)=>{i?cx.lineTo(xS(p.d),yS(p.fp)):cx.moveTo(xS(p.d),yS(p.fp));});cx.stroke();cx.setLineDash([]);
    cx.strokeStyle='rgba(0,212,170,.8)';cx.lineWidth=2;cx.setLineDash([]);cx.beginPath();bp.forEach((p,i)=>{i?cx.lineTo(xS(p.d),yS(p.fv)):cx.moveTo(xS(p.d),yS(p.fv));});cx.stroke();}}

  if(S.btc){const pt=BH.filter(([d])=>{const x=new Date(d);return x>=st&&x<=en;});
  if(pt.length>1){cx.strokeStyle='rgba(247,147,26,.2)';cx.lineWidth=8;cx.lineJoin='round';cx.beginPath();pt.forEach(([d,p],i)=>{i?cx.lineTo(xS(new Date(d)),yS(p)):cx.moveTo(xS(new Date(d)),yS(p));});cx.stroke();
  cx.strokeStyle='#f7931a';cx.lineWidth=2.5;cx.beginPath();pt.forEach(([d,p],i)=>{i?cx.lineTo(xS(new Date(d)),yS(p)):cx.moveTo(xS(new Date(d)),yS(p));});cx.stroke();
  const l=pt[pt.length-1],lx=xS(new Date(l[0])),ly=yS(l[1]);cx.beginPath();cx.arc(lx,ly,5,0,Math.PI*2);cx.fillStyle='#f7931a';cx.fill();cx.beginPath();cx.arc(lx,ly,8,0,Math.PI*2);cx.strokeStyle='rgba(247,147,26,.4)';cx.lineWidth=2;cx.stroke();}}
  cx.fillStyle='rgba(255,255,255,.3)';cx.font='10px JetBrains Mono';cx.textAlign='center';cx.fillText('BTC (USD)',m.l,m.t-6);
}

function logT(n,x){const t=[];for(let e=Math.floor(Math.log10(n));e<=Math.ceil(Math.log10(x));e++)[1,2,5].forEach(m=>{const v=m*Math.pow(10,e);if(v>=n*.9&&v<=x*1.1)t.push(v);});return t;}
function linT(n,x){const s=Math.pow(10,Math.floor(Math.log10(x-n)))/2,t=[];for(let v=Math.ceil(n/s)*s;v<=x;v+=s)t.push(v);return t;}
function dT(s,e){const t=[],y=(e-s)/(365.25*864e5);if(y>4)for(let i=s.getFullYear();i<=e.getFullYear();i++)t.push(new Date(i,0,1));else if(y>1.5)for(let i=s.getFullYear();i<=e.getFullYear();i++)[0,3,6,9].forEach(m=>t.push(new Date(i,m,1)));else for(let i=s.getFullYear();i<=e.getFullYear();i++)for(let m=0;m<12;m++)t.push(new Date(i,m,1));return t.filter(d=>d>=s&&d<=e);}

// === ROI Calculator ===
function calcROI(){
  const inp=document.getElementById('lookupDate').value;
  if(!inp)return;
  const d=new Date(inp+'T12:00:00');
  const etf=document.getElementById('roiETF').value;
  const strike=parseFloat(document.getElementById('roiStrike').value)||0;
  const premium=parseFloat(document.getElementById('roiPremium').value)||0;
  const contracts=parseInt(document.getElementById('roiContracts').value)||1;
  const res=document.getElementById('roiResult');
  
  const fv=pl(d),flr=fl(d),cei=cl(d);
  const yrs=((d-AD)/31557600000);
  const costPerShare=premium;
  const totalCost=premium*100*contracts;
  
  const isIBIT=etf==='ibit';
  const currency=isIBIT?'$':'C$';
  const etfName=isIBIT?'IBIT':'BTCC.B';
  const etfColor=isIBIT?'var(--pr)':'var(--cy)';
  
  // ETF prices at each scenario
  const pFloor=isIBIT?eIBIT(flr,d):eBTCC(flr,d);
  const pFair=isIBIT?eIBIT(fv,d):eBTCC(fv,d);
  const pCeil=isIBIT?eIBIT(cei,d):eBTCC(cei,d);
  
  function scenario(label,etfPrice,color){
    const intrinsic=Math.max(0,etfPrice-strike);
    const valuePerContract=intrinsic*100;
    const totalValue=valuePerContract*contracts;
    const pnl=totalValue-totalCost;
    const roi=totalCost>0?((pnl/totalCost)*100):0;
    const mult=totalCost>0?(totalValue/totalCost):0;
    const expired=intrinsic<=0;
    
    let html=`<div class="roi-sc" style="border-color:${expired?'var(--rd)':color}">`;
    html+=`<div class="roi-sc-label">${label}</div>`;
    html+=`<div class="roi-sc-etf" style="color:${color}">${currency}${etfPrice.toFixed(2)}</div>`;
    if(expired){
      html+=`<div class="roi-sc-pct" style="color:var(--rd)">EXPIRED OTM</div>`;
      html+=`<div class="roi-sc-pnl" style="color:var(--rd)">P&L: -${currency}${totalCost.toFixed(2)}</div>`;
      html+=`<div class="roi-sc-mult">-100% (total loss)</div>`;
    }else{
      html+=`<div class="roi-sc-pct" style="color:${pnl>=0?'var(--gr)':'var(--rd)'}">${pnl>=0?'+':''}${roi.toFixed(0)}%</div>`;
      html+=`<div class="roi-sc-mult">${mult.toFixed(1)}× return · intrinsic ${currency}${intrinsic.toFixed(2)}</div>`;
      html+=`<div class="roi-sc-pnl" style="color:${pnl>=0?'var(--gr)':'var(--rd)'}">P&L: ${pnl>=0?'+':''}${currency}${pnl.toFixed(2)}</div>`;
    }
    html+=`</div>`;
    return html;
  }
  
  const dateStr=d.toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});
  const breakeven=strike+premium;
  
  let html=`<div style="font-size:.8rem;margin-bottom:.8rem;color:var(--tx)">`;
  html+=`<strong>${etfName} Call Option</strong> <span style="color:var(--dim)">· Strike ${currency}${strike.toFixed(2)} · Premium ${currency}${premium.toFixed(2)} · ${contracts} contract${contracts>1?'s':''} · Expiry target: ${dateStr}</span>`;
  html+=`</div>`;
  html+=`<div style="font-size:.72rem;color:var(--dim);margin-bottom:.8rem;font-family:'JetBrains Mono',monospace">`;
  html+=`Cost basis: ${currency}${totalCost.toFixed(2)} · Breakeven: ${currency}${breakeven.toFixed(2)} per share`;
  html+=`</div>`;
  
  html+=`<div class="roi-scenarios">`;
  html+=scenario('@ Floor',pFloor,'var(--bl)');
  html+=scenario('@ Fair Value',pFair,'var(--gr)');
  html+=scenario('@ Ceiling',pCeil,'var(--rd)');
  html+=`</div>`;
  
  // Comparison vs just holding shares
  const currentPrice=isIBIT?38:13;
  const sharesWithCost=Math.floor(totalCost/currentPrice);
  const sharesPnLFair=(pFair-currentPrice)*sharesWithCost;
  const sharesROIFair=((pFair-currentPrice)/currentPrice)*100;
  
  html+=`<div class="roi-detail">`;
  html+=`<strong>Comparison — same ${currency}${totalCost.toFixed(2)} in ${etfName} shares today (${currency}${currentPrice}):</strong> `;
  html+=`${sharesWithCost} shares → @ Fair Value: ${currency}${(pFair*sharesWithCost).toFixed(2)} `;
  html+=`(P&L: ${sharesPnLFair>=0?'+':''}${currency}${sharesPnLFair.toFixed(2)}, ${sharesROIFair>=0?'+':''}${sharesROIFair.toFixed(0)}%) · `;
  html+=`Options leverage: ${totalCost>0&&sharesROIFair!==0?((((Math.max(0,pFair-strike)*100*contracts-totalCost)/totalCost*100)/sharesROIFair)).toFixed(1):'∞'}× vs shares`;
  html+=`</div>`;
  
  res.innerHTML=html;
  res.classList.add('show');
}
